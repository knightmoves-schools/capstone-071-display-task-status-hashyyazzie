
<!DOCTYPE html>
<html>

<head>
    <title>Task App</title>
    <style>
        /* This keeps the description and status on the same line */
        .row {
            display: flex;
            align-items: center;
        }

        /* Adds 5px padding to all sides of both descriptions and statuses */
        #tasks div div {
            padding: 5px;
        }
    </style>
</head>

<body>
    <div id="tasks">
        <div id="task-row-1" class="row">
            <div id="task-description-1">pack spikes for track meet</div>
            <div id="task-status-1">todo</div>
        </div>
        
        <div id="task-row-2" class="row">
            <div id="task-description-2">write draft english paper</div>
            <div id="task-status-2">doing</div>
        </div>
        
        <div id="task-row-3" class="row">
            <div id="task-description-3">finish math homework</div>
            <div id="task-status-3">done</div>
        </div>
    </div>
</body>

</html>
